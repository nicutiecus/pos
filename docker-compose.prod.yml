# docker-compose.prod.yml
version: '3.8'

services:
  web:
    build: ./backend
    command: gunicorn myproject.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - .env
    depends_on:
      - redis
      # - db  <-- Removed!

  redis:
    image: redis:7-alpine

  celery:
    build: .
    command: celery -A myproject worker -l INFO
    env_file:
      - .env
    depends_on:
      - redis

  celery-beat:
    build: .
    command: celery -A myproject beat -l INFO
    env_file:
      - .env
    depends_on:
      - redis