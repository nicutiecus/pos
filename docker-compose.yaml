services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=coldroom_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
     
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
  
  redis:  # <--- THIS NAME MATTERS
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data: